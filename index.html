<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Class 11 Quiz App</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .container {
        background: white;
        padding: 25px;
        border-radius: 15px;
        width: 420px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        text-align: center;
    }

    input {
        padding: 10px;
        width: 90%;
        margin: 10px 0;
        border-radius: 8px;
        border: 1px solid #ccc;
    }

    button {
        margin-top: 15px;
        padding: 12px;
        width: 100%;
        border: none;
        background: #667eea;
        color: white;
        font-size: 16px;
        border-radius: 8px;
        cursor: pointer;
    }

    button:hover {
        background: #5a67d8;
    }

    .option {
        display: block;
        margin: 10px 0;
        padding: 12px;
        background: #eee;
        border-radius: 8px;
        cursor: pointer;
    }

    .option:hover {
        background: #ddd;
    }

    .correct {
        background: #4CAF50 !important;
        color: white;
    }

    .wrong {
        background: #f44336 !important;
        color: white;
    }

    #timer, #progress {
        font-weight: bold;
        margin-bottom: 10px;
    }
</style>
</head>

<body>

<div class="container" id="app">

    <!-- FRONT PAGE -->
    <div id="startScreen">
        <h1>🧠 Quiz Website</h1>
        <p>Test your Computer Knowledge</p>
        <input type="text" id="username" placeholder="Enter your name">
        <button onclick="startQuiz()">Start Quiz</button>
    </div>

</div>

<script>

const quiz = [
    { question: "What does CPU stand for?", options: ["Central Processing Unit", "Computer Personal Unit", "Central Program Utility", "Control Processing Unit"], answer: 0 },
    { question: "Which device is used to input data?", options: ["Monitor", "Keyboard", "Printer", "Speaker"], answer: 1 },
    { question: "What does RAM stand for?", options: ["Random Access Memory", "Read Access Memory", "Run Access Memory", "Real Application Memory"], answer: 0 },
    { question: "Which is an output device?", options: ["Mouse", "Keyboard", "Monitor", "Scanner"], answer: 2 },
    { question: "What is the brain of the computer?", options: ["RAM", "CPU", "Hard Disk", "Motherboard"], answer: 1 },
    { question: "Which language is used to create web pages?", options: ["HTML", "C++", "Python", "Java"], answer: 0 },
    { question: "What does ALU stand for?", options: ["Arithmetic Logic Unit", "Application Logic Unit", "Advanced Logic Unit", "Arithmetic Link Unit"], answer: 0 },
    { question: "Which storage is permanent?", options: ["RAM", "Cache", "ROM", "Register"], answer: 2 },
    { question: "Which is an example of operating system?", options: ["Windows", "MS Word", "Excel", "PowerPoint"], answer: 0 },
    { question: "What is the full form of URL?", options: ["Uniform Resource Locator", "Universal Resource Link", "Uniform Reference Link", "Universal Reference Locator"], answer: 0 },
    { question: "Which device is used to print documents?", options: ["Monitor", "Printer", "Speaker", "Mouse"], answer: 1 },
    { question: "What is the smallest unit of data?", options: ["Byte", "Bit", "KB", "MB"], answer: 1 },
    { question: "Which memory is fastest?", options: ["RAM", "ROM", "Cache", "Hard Disk"], answer: 2 },
    { question: "What does GUI stand for?", options: ["Graphical User Interface", "General User Interface", "Graphical Utility Interface", "General Utility Interface"], answer: 0 },
    { question: "Which is a programming language?", options: ["HTML", "CSS", "Python", "HTTP"], answer: 2 },
    { question: "What is the full form of USB?", options: ["Universal Serial Bus", "United System Bus", "Universal System Bus", "Unique Serial Bus"], answer: 0 },
    { question: "Which part stores data permanently?", options: ["RAM", "Hard Disk", "Cache", "Register"], answer: 1 },
    { question: "Which device is used to move cursor?", options: ["Keyboard", "Monitor", "Mouse", "Printer"], answer: 2 },
    { question: "What does LAN stand for?", options: ["Local Area Network", "Large Area Network", "Logical Area Network", "Long Area Network"], answer: 0 },
    { question: "Which is an input device?", options: ["Scanner", "Printer", "Monitor", "Speaker"], answer: 0 }
];

let current = 0;
let score = 0;
let timeLeft = 10;
let timer;
let answered = false;
let userName = "";

// START QUIZ
function startQuiz() {
    userName = document.getElementById("username").value || "Player";

    document.getElementById("app").innerHTML = `
        <div id="progress"></div>
        <div id="timer">Time: 10</div>
        <h2 id="question"></h2>
        <div id="options"></div>
        <button onclick="nextQuestion()">Next</button>
    `;

    loadQuestion();
}

// LOAD QUESTION
function loadQuestion() {
    clearInterval(timer);
    answered = false;
    timeLeft = 10;

    let q = quiz[current];

    document.getElementById("question").innerText = q.question;
    document.getElementById("progress").innerText =
        `Question ${current + 1} of ${quiz.length}`;

    let html = "";

    q.options.forEach((opt, index) => {
        html += `<div class="option" onclick="selectAnswer(${index}, this)">${opt}</div>`;
    });

    document.getElementById("options").innerHTML = html;

    startTimer();
}

// TIMER
function startTimer() {
    document.getElementById("timer").innerText = "Time: " + timeLeft;

    timer = setInterval(() => {
        timeLeft--;
        document.getElementById("timer").innerText = "Time: " + timeLeft;

        if (timeLeft <= 0) {
            clearInterval(timer);
            revealAnswer();
        }
    }, 1000);
}

// SELECT ANSWER
function selectAnswer(index, el) {
    if (answered) return;

    answered = true;
    clearInterval(timer);

    let correct = quiz[current].answer;

    if (index === correct) {
        el.classList.add("correct");
        score++;
    } else {
        el.classList.add("wrong");
        document.querySelectorAll(".option")[correct].classList.add("correct");
    }
}

// SHOW CORRECT
function revealAnswer() {
    answered = true;
    let correct = quiz[current].answer;
    document.querySelectorAll(".option")[correct].classList.add("correct");
}

// NEXT
function nextQuestion() {
    current++;

    if (current < quiz.length) {
        loadQuestion();
    } else {
        document.getElementById("app").innerHTML = `
            <h2>🎉 Quiz Finished!</h2>
            <p>${userName}, your score: ${score}/${quiz.length}</p>
            <button onclick="location.reload()">Restart</button>
        `;
    }
}

</script>

</body>
</html>
