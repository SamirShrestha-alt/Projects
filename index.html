<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cool Quiz App</title>

<style>

/* Animated Background */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(-45deg, #1e3c72, #2a5298, #6a11cb, #2575fc);
    background-size: 400% 400%;
    animation: bgMove 10s ease infinite;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

@keyframes bgMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* Card */
.container {
    width: 420px;
    text-align: center;
}

/* Glass Effect */
.start {
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.1);
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 0 40px rgba(0,0,0,0.3);
    animation: fadeIn 1s ease;
}

/* Animation */
@keyframes fadeIn {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1; transform:translateY(0);}
}

/* Title */
.title {
    font-size: 32px;
    color: #fff;
    text-shadow: 0 0 10px #00f2fe;
    animation: float 2s ease-in-out infinite;
}

@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
}

/* Subtitle */
.subtitle {
    color: #ddd;
    margin-bottom: 20px;
}

/* Input */
input {
    width: 90%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    margin-bottom: 15px;
}

/* Neon Button */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #00f2fe;
    color: black;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #4facfe;
    box-shadow: 0 0 15px #00f2fe;
    transform: scale(1.05);
}

/* Quiz */
.quiz-box {
    background: white;
    padding: 25px;
    border-radius: 15px;
}

.option {
    background: #eee;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    cursor: pointer;
}

.option:hover { background: #ddd; }

.correct { background: green !important; color:white; }
.wrong { background: red !important; color:white; }

#timer { font-weight: bold; }

</style>
</head>

<body>

<div class="container" id="app">

<!-- COOL START UI -->
<div class="start">
    <h1 class="title">⚡ Quiz Master</h1>
    <p class="subtitle">Are you ready to test your brain?</p>
    <input type="text" id="name" placeholder="Enter your name">
    <button onclick="startQuiz()">Start Game 🚀</button>
</div>

</div>

<script>

const quiz = [
{q:"CPU stands for?",o:["Central Processing Unit","Control Unit","Computer Unit","Core Unit"],a:0},
{q:"Input device?",o:["Monitor","Keyboard","Speaker","Printer"],a:1},
{q:"RAM is?",o:["Permanent","Temporary","External","Optical"],a:1},
{q:"Output device?",o:["Mouse","Keyboard","Monitor","Scanner"],a:2},
{q:"Brain of computer?",o:["RAM","CPU","Hard Disk","ROM"],a:1},
{q:"HTML is used for?",o:["Programming","Web pages","Games","Database"],a:1},
{q:"ALU stands for?",o:["Arithmetic Logic Unit","Array Logic Unit","Advanced Logic Unit","None"],a:0},
{q:"Permanent memory?",o:["RAM","Cache","ROM","Register"],a:2},
{q:"OS example?",o:["Word","Windows","Excel","Paint"],a:1},
{q:"URL means?",o:["Uniform Resource Locator","Universal Link","Unique Link","None"],a:0},
{q:"Print device?",o:["Monitor","Printer","Speaker","Mouse"],a:1},
{q:"Smallest unit?",o:["Byte","Bit","KB","MB"],a:1},
{q:"Fastest memory?",o:["RAM","ROM","Cache","Disk"],a:2},
{q:"GUI means?",o:["Graphical User Interface","General UI","Game UI","None"],a:0},
{q:"Programming language?",o:["HTML","CSS","Python","HTTP"],a:2},
{q:"USB full form?",o:["Universal Serial Bus","United Bus","Unique Bus","None"],a:0},
{q:"Stores data permanently?",o:["RAM","Disk","Cache","Register"],a:1},
{q:"Cursor device?",o:["Keyboard","Mouse","Monitor","Printer"],a:1},
{q:"LAN stands for?",o:["Local Area Network","Large Area Network","Long Network","None"],a:0},
{q:"Input device?",o:["Scanner","Printer","Monitor","Speaker"],a:0}
];

let i=0, score=0, timer, time=10, user="";

function startQuiz(){
    user=document.getElementById("name").value||"Player";
    document.getElementById("app").innerHTML=`
        <div class="quiz-box">
        <div id="timer"></div>
        <h2 id="q"></h2>
        <div id="opt"></div>
        <button onclick="next()">Next</button>
        </div>
    `;
    load();
}

function load(){
    clearInterval(timer);
    time=10;
    let q=quiz[i];
    document.getElementById("q").innerText=q.q;

    let html="";
    q.o.forEach((x,idx)=>{
        html+=`<div class="option" onclick="ans(${idx},this)">${x}</div>`;
    });

    document.getElementById("opt").innerHTML=html;
    startTimer();
}

function startTimer(){
    document.getElementById("timer").innerText="Time: "+time;
    timer=setInterval(()=>{
        time--;
        document.getElementById("timer").innerText="Time: "+time;
        if(time==0){
            clearInterval(timer);
            showAns();
        }
    },1000);
}

function ans(idx,el){
    clearInterval(timer);
    let c=quiz[i].a;
    if(idx==c){
        el.classList.add("correct");
        score++;
    }else{
        el.classList.add("wrong");
        document.querySelectorAll(".option")[c].classList.add("correct");
    }
}

function showAns(){
    let c=quiz[i].a;
    document.querySelectorAll(".option")[c].classList.add("correct");
}

function next(){
    i++;
    if(i<quiz.length){
        load();
    }else{
        document.getElementById("app").innerHTML=`
            <div class="quiz-box">
            <h2>🎉 Finished</h2>
            <p>${user}, Score: ${score}/${quiz.length}</p>
            <button onclick="location.reload()">Restart</button>
            </div>
        `;
    }
}

</script>

</body>
</html>
