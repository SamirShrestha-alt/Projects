<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Class 11 Quiz App</title>

<style>
/* Animated Background */
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(-45deg, #667eea, #764ba2, #6b46c1, #5a67d8);
    background-size: 400% 400%;
    animation: gradientBG 8s ease infinite;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* Main Container */
.container {
    padding: 25px;
    border-radius: 20px;
    width: 420px;
    text-align: center;
}

/* Glass Start Card */
.start-card {
    backdrop-filter: blur(12px);
    background: rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    animation: fadeIn 1s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Title */
.title {
    font-size: 32px;
    font-weight: bold;
    color: white;
    margin-bottom: 10px;
}

/* Subtitle */
.subtitle {
    color: #ddd;
    margin-bottom: 20px;
}

/* Input */
input {
    padding: 12px;
    width: 90%;
    border-radius: 10px;
    border: none;
    outline: none;
    margin-bottom: 15px;
}

/* Button */
button {
    margin-top: 10px;
    padding: 12px;
    width: 100%;
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 10px;
    cursor: pointer;
}

/* Start Button */
.start-btn {
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    font-size: 18px;
    font-weight: bold;
    transition: 0.3s;
}

.start-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 15px rgba(0,114,255,0.7);
}

/* Quiz UI */
.quiz-box {
    background: white;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.option {
    display: block;
    margin: 10px 0;
    padding: 12px;
    background: #eee;
    border-radius: 8px;
    cursor: pointer;
}

.option:hover {
    background: #ddd;
}

.correct {
    background: #4CAF50 !important;
    color: white;
}

.wrong {
    background: #f44336 !important;
    color: white;
}

#timer, #progress {
    font-weight: bold;
    margin-bottom: 10px;
}

.info {
    margin-top: 15px;
    font-size: 13px;
    color: #eee;
}
</style>
</head>

<body>

<div class="container" id="app">

    <!-- MODERN START UI -->
    <div id="startScreen" class="start-card">
        <h1 class="title">🧠 Quiz Master</h1>
        <p class="subtitle">Challenge your Computer Knowledge</p>

        <input type="text" id="username" placeholder="Enter your name">

        <button class="start-btn" onclick="startQuiz()">Start Quiz 🚀</button>

        <p class="info">⏱️ 10 sec • 🎯 20 Questions • 📊 Instant Score</p>
    </div>

</div>

<script>

const quiz = [
    { question: "What does CPU stand for?", options: ["Central Processing Unit", "Computer Personal Unit", "Central Program Utility", "Control Processing Unit"], answer: 0 },
    { question: "Which device is used to input data?", options: ["Monitor", "Keyboard", "Printer", "Speaker"], answer: 1 },
    { question: "What does RAM stand for?", options: ["Random Access Memory", "Read Access Memory", "Run Access Memory", "Real Application Memory"], answer: 0 },
    { question: "Which is an output device?", options: ["Mouse", "Keyboard", "Monitor", "Scanner"], answer: 2 },
    { question: "What is the brain of the computer?", options: ["RAM", "CPU", "Hard Disk", "Motherboard"], answer: 1 },
    { question: "Which language is used to create web pages?", options: ["HTML", "C++", "Python", "Java"], answer: 0 },
    { question: "What does ALU stand for?", options: ["Arithmetic Logic Unit", "Application Logic Unit", "Advanced Logic Unit", "Arithmetic Link Unit"], answer: 0 },
    { question: "Which storage is permanent?", options: ["RAM", "Cache", "ROM", "Register"], answer: 2 },
    { question: "Which is an example of operating system?", options: ["Windows", "MS Word", "Excel", "PowerPoint"], answer: 0 },
    { question: "What is the full form of URL?", options: ["Uniform Resource Locator", "Universal Resource Link", "Uniform Reference Link", "Universal Reference Locator"], answer: 0 },
    { question: "Which device is used to print documents?", options: ["Monitor", "Printer", "Speaker", "Mouse"], answer: 1 },
    { question: "What is the smallest unit of data?", options: ["Byte", "Bit", "KB", "MB"], answer: 1 },
    { question: "Which memory is fastest?", options: ["RAM", "ROM", "Cache", "Hard Disk"], answer: 2 },
    { question: "What does GUI stand for?", options: ["Graphical User Interface", "General User Interface", "Graphical Utility Interface", "General Utility Interface"], answer: 0 },
    { question: "Which is a programming language?", options: ["HTML", "CSS", "Python", "HTTP"], answer: 2 },
    { question: "What is the full form of USB?", options: ["Universal Serial Bus", "United System Bus", "Universal System Bus", "Unique Serial Bus"], answer: 0 },
    { question: "Which part stores data permanently?", options: ["RAM", "Hard Disk", "Cache", "Register"], answer: 1 },
    { question: "Which device is used to move cursor?", options: ["Keyboard", "Monitor", "Mouse", "Printer"], answer: 2 },
    { question: "What does LAN stand for?", options: ["Local Area Network", "Large Area Network", "Logical Area Network", "Long Area Network"], answer: 0 },
    { question: "Which is an input device?", options: ["Scanner", "Printer", "Monitor", "Speaker"], answer: 0 }
];

let current = 0;
let score = 0;
let timeLeft = 10;
let timer;
let answered = false;
let userName = "";

// START QUIZ
function startQuiz() {
    userName = document.getElementById("username").value || "Player";

    document.getElementById("app").innerHTML = `
        <div class="quiz-box">
            <div id="progress"></div>
            <div id="timer">Time: 10</div>
            <h2 id="question"></h2>
            <div id="options"></div>
            <button onclick="nextQuestion()">Next</button>
        </div>
    `;

    loadQuestion();
}

// LOAD QUESTION
function loadQuestion() {
    clearInterval(timer);
    answered = false;
    timeLeft = 10;

    let q = quiz[current];

    document.getElementById("question").innerText = q.question;
    document.getElementById("progress").innerText =
        `Question ${current + 1} of ${quiz.length}`;

    let html = "";

    q.options.forEach((opt, index) => {
        html += `<div class="option" onclick="selectAnswer(${index}, this)">${opt}</div>`;
    });

    document.getElementById("options").innerHTML = html;

    startTimer();
}

// TIMER
function startTimer() {
    document.getElementById("timer").innerText = "Time: " + timeLeft;

    timer = setInterval(() => {
        timeLeft--;
        document.getElementById("timer").innerText = "Time: " + timeLeft;

        if (timeLeft <= 0) {
            clearInterval(timer);
            revealAnswer();
        }
    }, 1000);
}

// SELECT ANSWER
function selectAnswer(index, el) {
    if (answered) return;

    answered = true;
    clearInterval(timer);

    let correct = quiz[current].answer;

    if (index === correct) {
        el.classList.add("correct");
        score++;
    } else {
        el.classList.add("wrong");
        document.querySelectorAll(".option")[correct].classList.add("correct");
    }
}

// SHOW CORRECT
function revealAnswer() {
    answered = true;
    let correct = quiz[current].answer;
    document.querySelectorAll(".option")[correct].classList.add("correct");
}

// NEXT
function nextQuestion() {
    current++;

    if (current < quiz.length) {
        loadQuestion();
    } else {
        document.getElementById("app").innerHTML = `
            <div class="quiz-box">
                <h2>🎉 Quiz Finished!</h2>
                <p>${userName}, your score: ${score}/${quiz.length}</p>
                <button onclick="location.reload()">Restart</button>
            </div>
        `;
    }
}

</script>

</body>
</html>
